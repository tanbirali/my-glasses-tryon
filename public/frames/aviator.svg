<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320">
  <defs>
    <linearGradient id="frame" x1="0" x2="1">
      <stop offset="0%" stop-color="#4a403f"/>
      <stop offset="100%" stop-color="#2f2a2a"/>
    </linearGradient>
  </defs>

  <!-- left frame -->
  <polygon points="120,90 310,90 350,120 350,220 310,250 120,250 80,220 80,120"
           fill="none" stroke="url(#frame)" stroke-width="18"/>

  <!-- right frame -->
  <polygon points="590,90 780,90 820,120 820,220 780,250 590,250 550,220 550,120"
           fill="none" stroke="url(#frame)" stroke-width="18"/>

  <!-- bridge -->
  <path d="M350 115 L410 95 L490 95 L550 115"
        fill="none" stroke="url(#frame)" stroke-width="18"/>

  <rect x="420" y="105" width="60" height="28"
        fill="none" stroke="url(#frame)" stroke-width="12"/>

  <!-- lenses -->
  <polygon points="120,90 310,90 350,120 350,220 310,250 120,250 80,220 80,120"
           fill="#b3947c" opacity="0.55"/>

  <polygon points="590,90 780,90 820,120 820,220 780,250 590,250 550,220 550,120"
           fill="#b3947c" opacity="0.55"/>
</svg>