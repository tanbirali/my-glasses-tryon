<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360">
  <defs>
    <filter id="shadow">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Left round lens -->
  <circle cx="280" cy="170" r="95"
          fill="none" stroke="#222" stroke-width="5"/>

  <!-- Right round lens -->
  <circle cx="620" cy="170" r="95"
          fill="none" stroke="#222" stroke-width="5"/>

  <!-- Bridge -->
  <path d="M375 120 Q450 90 525 120"
        fill="none" stroke="#222" stroke-width="6"/>

  <!-- Nose pads -->
  <path d="M420 155 Q410 175 420 195"
        fill="none" stroke="#444" stroke-width="3"/>
  <path d="M480 155 Q490 175 480 195"
        fill="none" stroke="#444" stroke-width="3"/>

  <!-- Hinges -->
  <rect x="178" y="148" width="18" height="18" rx="2" fill="#222"/>
  <rect x="704" y="148" width="18" height="18" rx="2" fill="#222"/>

  <!-- Visible temples -->
  <rect x="145" y="140" width="35" height="30" rx="4" fill="#222"/>
  <rect x="720" y="140" width="35" height="30" rx="4" fill="#222"/>

  <!-- Reflections -->
  <path d="M215 110 L175 260" stroke="#999" stroke-width="8" opacity="0.25"/>
  <path d="M685 110 L725 260" stroke="#999" stroke-width="8" opacity="0.25"/>
</svg>